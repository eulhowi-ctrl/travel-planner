<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커뮤니티 - TRAVEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="community-styles.css">
</head>
<body data-page="community">
    <div id="header-root"></div>

    <div class="container">
        <div class="community-header">
            <h1>커뮤니티</h1>
            <button class="btn btn-primary" id="writeBtn">✏️ 글쓰기</button>
        </div>

        <div class="community-tabs">
            <button class="community-tab active" data-tab="qna">Q&A</button>
            <button class="community-tab" data-tab="stories">여행기</button>
            <button class="community-tab" data-tab="buddy">여행 버디</button>
            <button class="community-tab" data-tab="ranking">베스트 리뷰어</button>
        </div>

        <div class="tab-content active" data-tab="qna">
            <div id="qnaList"></div>
        </div>

        <div class="tab-content" data-tab="stories">
            <div class="stories-grid" id="storiesGrid"></div>
        </div>

        <div class="tab-content" data-tab="buddy">
            <div class="buddy-grid" id="buddyList"></div>
        </div>

        <div class="tab-content" data-tab="ranking">
            <div class="ranking-list" id="rankingList"></div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="writeModal">
        <div class="modal-box">
            <button class="modal-close" id="closeWriteModalBtn">&times;</button>
            <h3 class="mb-16">Q&A 질문 작성</h3>
            <label for="writeTitleInput">제목</label>
            <input type="text" id="writeTitleInput" placeholder="궁금한 점을 입력하세요">
            <label for="writeBodyInput" class="mt-16">내용</label>
            <textarea id="writeBodyInput" rows="4" placeholder="자세한 내용을 입력하세요"></textarea>
            <button class="btn btn-primary btn-block mt-16" id="submitWriteBtn">등록하기</button>
        </div>
    </div>

    <div id="footer-root"></div>
    <script src="script.js"></script>
    <script src="community-script.js"></script>
</body>
</html>
