<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 일정 - TRAVEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
    .itinerary-hero { padding: 40px 0 24px; }
    .itinerary-hero h1 { font-size: 30px; margin-bottom: 6px; }
    .day-tabs { display: flex; gap: 8px; margin: 24px 0; flex-wrap: wrap; }
    .day-tab { padding: 10px 20px; border-radius: var(--radius-pill); background: var(--color-white); border: 1.5px solid var(--color-gray-300); font-weight: 600; font-size: 14px; }
    .day-tab.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

    #weatherWidget { margin-bottom: 24px; }
    #priceCheckSection { margin-bottom: 24px; }
    #transportSection { margin-bottom: 24px; }
    #localTipsSection { margin-bottom: 24px; }

    .schedule-item { display: grid; grid-template-columns: 90px 1fr; gap: 20px; padding: 20px 0; border-bottom: 1px solid var(--color-gray-100); }
    .schedule-time { font-weight: 700; color: var(--color-primary); font-size: 14px; }
    .schedule-body h4 { font-size: 16px; margin-bottom: 6px; }
    .schedule-body p { font-size: 13px; color: var(--color-gray-500); margin-bottom: 10px; }
    .schedule-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .schedule-links a, .schedule-links button { font-size: 12px; padding: 6px 12px; border-radius: var(--radius-pill); background: var(--color-gray-100); color: var(--color-gray-700); }
    .schedule-links a:hover, .schedule-links button:hover { background: var(--color-primary); color: #fff; }

    .budget-analysis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 16px; }
    .budget-item { padding: 18px; text-align: center; }
    .budget-item .amount { font-size: 20px; font-weight: 700; color: var(--color-primary); }
    .budget-item .label { font-size: 12px; color: var(--color-gray-500); margin-top: 4px; }

    .share-row { display: flex; gap: 12px; margin-top: 24px; }

    .transport-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .transport-card { padding: 20px; }
    .transport-option { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--color-gray-100); font-size: 13px; }
    .transport-tip { font-size: 12px; color: var(--color-gray-500); margin-top: 10px; }

    .qr-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .qr-display { text-align: center; padding: 16px 0; }
    .qr-display img { margin: 0 auto 12px; border-radius: var(--radius-sm); }

    @media (max-width: 700px) { .transport-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page="itinerary">
    <div id="header-root"></div>

    <div class="container">
        <div class="itinerary-hero">
            <div class="flex-between">
                <div>
                    <h1 id="tripTitle">부산 3박 4일 여행</h1>
                    <p class="text-muted" id="tripDates">2026.08.14 - 2026.08.17 · 2인</p>
                </div>
                <div class="flex gap-12">
                    <button class="btn btn-secondary" id="autoGenerateBtn">✨ 자동 일정 생성</button>
                    <button class="btn btn-primary" id="shareBtn">공유하기</button>
                </div>
            </div>
        </div>

        <div id="weatherWidget"></div>
        <div id="priceCheckSection"></div>

        <div class="day-tabs" id="dayTabs"></div>
        <div id="transportSection"></div>
        <div id="localTipsSection"></div>
        <div id="scheduleContainer"></div>

        <section class="section">
            <h2 class="section-title">예산 분석</h2>
            <div class="budget-analysis" id="budgetAnalysis"></div>
            <a href="budget.html" class="btn btn-secondary mt-16">예산 상세 관리 →</a>
        </section>

        <section class="section">
            <h2 class="section-title">여행 후기</h2>
            <div id="reviewSection"></div>
        </section>

        <div class="share-row">
            <button class="btn btn-secondary" id="copyLinkBtn">🔗 링크 복사</button>
            <button class="btn btn-secondary" id="qrShareBtn">📱 QR 코드로 공유</button>
        </div>
    </div>

    <div class="modal-overlay hidden" id="qrModal">
        <div class="modal-box">
            <button class="modal-close" id="closeQrModalBtn">&times;</button>
            <h3 class="mb-16">QR 코드</h3>
            <div class="qr-tabs chip-group">
                <button class="chip selected" data-qr="link">공유 링크</button>
                <button class="chip" data-qr="wifi">숙소 와이파이</button>
            </div>
            <div class="qr-display" id="qrDisplay"></div>
        </div>
    </div>

    <div id="footer-root"></div>
    <script src="script.js"></script>
    <script src="weather-api.js"></script>
    <script src="qr-generator.js"></script>
    <script src="destinations-data.js"></script>

                    ]
                },
            ]

        // Fallback for destinations without a hand-written day-by-day schedule:
        // spread their tags across a generic slot pattern sized to their duration.
        const DURATION_DAY_COUNT = { day: 1, '1n2d': 2, '2n3d': 3, '3n+': 4 };
        const BUDGET_CATEGORY_RATIOS = [
            ['항공/교통', 0.27], ['숙박', 0.32], ['식사', 0.22], ['활동', 0.12], ['쇼핑', 0.08],
        ];

        function buildBudgetItems(totalWon) {
            return BUDGET_CATEGORY_RATIOS.map(([label, ratio]) => ({
                label, amount: Math.round(totalWon * ratio / 10000) * 10000,
            }));
        }
        const GENERIC_SLOT_PATTERN = [
            { time: '09:00', type: 'activity' },
            { time: '12:00', type: 'meal' },
            { time: '15:00', type: 'activity' },
            { time: '18:30', type: 'meal' },
        ];

        function buildGenericItinerary(dest) {
            const dayCount = DURATION_DAY_COUNT[dest.duration] || 2;
            const activityLabels = dest.tags.length ? dest.tags : ['대표 명소'];
            let activityIdx = 0;
            const days = [];
            for (let d = 0; d < dayCount; d++) {
                const items = GENERIC_SLOT_PATTERN.map(slot => {
                    if (slot.type === 'meal') {
                        return { time: slot.time, title: '식사 시간', desc: `${dest.name} 현지 맛집에서 여유롭게 식사하세요`, links: [] };
                    }
                    const tag = activityLabels[activityIdx % activityLabels.length];
                    activityIdx++;
                    const mapQuery = dest.baseCity || dest.name;
                    const isKorea = dest.country === '대한민국';
                    return {
                        time: slot.time, title: `${dest.name} ${tag} 코스`, desc: `${dest.name}에서 ${tag} 테마로 즐기는 일정이에요`,
                        links: [
                            { label: '지도', url: mapSearchUrl(mapQuery, dest.country) },
                            { label: '후기', url: isKorea ? naverReviewSearchUrl(mapQuery) : googleReviewSearchUrl(mapQuery) },
                        ],
                    };
                });
                days.push({ day: d + 1, date: '', items });
            }
            return {
                title: `${dest.name} ${dayCount}일 여행`, city: dest.baseCity || dest.name, country: dest.country, days, dayCount,
                budgetItems: buildBudgetItems(dest.price * 10000),
            };
        }

        // Hand-written day-by-day schedules for specific destination packages,
        // keyed by the generated dest.name. These exist because the generic
        // slot-filler above only ever produces placeholder text ("OO 역사 코스")
        // with no real venue — fine as a default for 600+ auto-generated
        // destinations, but useless for anyone actually planning the trip.
        // Add more entries here as specific packages get curated content.
        const HAND_WRITTEN_ITINERARIES = {
            '리우데자네이루 시티 투어': {
                title: '리우데자네이루 시티 투어 2일', city: '리우데자네이루', country: '브라질', dayCount: 2,

                        items: [

                                { label: '지도', url: googleMapsSearchUrl('Corcovado Christ the Redeemer Rio de Janeiro') },

                            { time: '12:30', title: '산타테레자 점심 - Aprazível', desc: '열대 정원이 내려다보이는 테라스에서 브라질 가정식을 즐기는 산타테레자 대표 레스토랑', links: [

                            ]},

                                { label: '지도', url: googleMapsSearchUrl('Escadaria Selarón Rio de Janeiro') },
                            ]},
                            { time: '16:00', title: '산타테레자 트램 (Bondinho de Santa Teresa)', desc: '구시가 골목을 도는 관광용 노면전차 탑승', links: [

                            ]},

                            ]},
                        ]
                    },

                        day: 2, date: '',
                        items: [
                            { time: '09:00', title: '팡지아수카르 (Pão de Açúcar) 케이블카', desc: '우르카 프라이아 베르멜랴역에서 2단 케이블카로 정상까지. 주말 시간대는 빠르게 매진되니 공식 사이트에서 사전 예약 추천', links: [

        function resolveItinerary() {
            const generated = getLS('generatedItinerary', null);
            if (generated && generated.days && generated.days.length) return generated;
            const selectedId = Number(localStorage.getItem('selectedDestinationId'));
            if (selectedId) {
                const dest = (typeof DESTINATIONS_FULL !== 'undefined' ? DESTINATIONS_FULL : []).find(d => d.id === selectedId);
                if (dest) {
                    const handWritten = HAND_WRITTEN_ITINERARIES[dest.name];
                    if (handWritten) return handWritten;
                    if (dest.baseCity !== '부산') return buildGenericItinerary(dest);
                }
            }
            return BUSAN_ITINERARY;
        }

        const ITINERARY = resolveItinerary();

        // Static transportation data, mapped by city (long-distance + local + tips).
        const TRANSPORT_DATA = {

                ],

            },
            '리우데자네이루': {
                longDistance: [
                    { mode: '✈️ 항공', detail: '인천에서 직항 없음 · 로스앤젤레스/두바이/아디스아바바 등 경유, 총 24시간 이상' },
                    { mode: '✈️ 국내선 환승', detail: '상파울루(GRU) 경유 시 리우 갈레앙국제공항(GIG)까지 국내선 추가 탑승' },
                ],
                local: [
                    { mode: '🚇 메트로', detail: '1·2·4호선, 코파카바나·이파네마·센트루 연결 (산타테레자·코르코바두는 미연결)' },
                    { mode: '🚗 우버·99', detail: '길거리 택시보다 우버(Uber)·99 앱이 요금 분쟁 없이 안전' },
                    { mode: '🚋 산타테레자 트램', detail: '헤멘시아~산타테레자 구시가를 잇는 관광용 노면전차' },
                ],
                tip: '해변·센트루·라파 지역은 소매치기가 잦아요. 귀중품 노출을 최소화하고, 야간 이동은 도보 대신 우버를 이용하세요.',
            },
        };

        // Local (insider) tips, separate from the transport-specific tip above.
        const LOCAL_TIPS = {
            '부산': [
                '자갈치시장은 오전 일찍 가야 활어 상태가 가장 좋아요.',
                '광안리보다 송정이 한적하고 서핑하기 좋아요.',
                '해운대 주차는 주말엔 꽉 차니 지하철 이용을 추천해요.',
            ],
            '리우데자네이루': [
                '코르코바도 예수상 열차 티켓은 성수기에 며칠 전 매진되니 tremdocorcovado.rio에서 미리 예약하세요.',
                '팡지아수카르 케이블카도 bondinho.com.br 공식 사이트에서 시간대 예약 후 방문하는 게 좋아요.',
                '페이조아다(feijoada)는 전통적으로 토요일에만 제대로 된 걸 파는 식당이 많아요.',
                '이파네마 아르푸아도르 바위는 무료로 일몰을 볼 수 있는 현지인 명소예요.',
                '해변에서는 휴대폰·귀중품을 최소한만 들고 가는 게 안전해요.',
            ],
        };

        function renderLocalTips() {
            const tips = LOCAL_TIPS[ITINERARY.city];
            const el = document.getElementById('localTipsSection');
            if (!tips) {
                const tipsSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(ITINERARY.city + ' 현지인 여행 팁')}`;
                el.innerHTML = `<div class="card" style="padding:20px 24px;"><p class="text-muted" style="margin:0;">🧭 ${ITINERARY.city}의 현지인 팁은 아직 준비된 게 없어요. <a href="${tipsSearchUrl}" target="_blank" rel="noopener">구글에서 찾아보기 →</a></p></div>`;
                return;
            }
            el.innerHTML = `
                <div class="card" style="padding:20px 24px;">
                    <h4 class="mb-16">🧭 현지인 팁</h4>
                    <ul>
                        ${tips.map(t => `<li style="font-size:13px; color:var(--color-gray-700); margin-bottom:8px;">· ${t}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        // Domestic (non-Jeju) destinations aren't realistically reached by air —
        // KTX/intercity bus is how people actually travel there, so those get
        // train/bus links instead of a flight search.
        function renderPriceCheckSection() {
            const el = document.getElementById('priceCheckSection');
            const isDomesticByLand = ITINERARY.country === '대한민국' && ITINERARY.city !== '제주도';
            const directionsUrl = isDomesticByLand ? terminalDirectionsUrl(ITINERARY.city) : null;
            const transportButtons = isDomesticByLand
                ? `<a href="${KORAIL_SEARCH_URL}" target="_blank" rel="noopener" class="btn btn-secondary btn-small">🚄 코레일 조회</a>
                   <a href="${naverBusTerminalSearchUrl(ITINERARY.city)}" target="_blank" rel="noopener" class="btn btn-secondary btn-small">🚌 시외버스터미널</a>
                   ${directionsUrl ? `<a href="${directionsUrl}" target="_blank" rel="noopener" class="btn btn-secondary btn-small">🗺️ 길찾기</a>` : ''}`
                : `<a href="${naverFlightDeepLink(ITINERARY.city)}" target="_blank" rel="noopener" class="btn btn-secondary btn-small">✈️ 항공권 가격·일정 확인</a>
                   <a href="${googleMapsSearchUrl(ITINERARY.city + ' 국제공항')}" target="_blank" rel="noopener" class="btn btn-secondary btn-small">🛫 공항 위치</a>`;
            const dates = getTripDates();
            el.innerHTML = `
                <div class="card" style="padding:20px 24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
                    <div>
                        <strong>💸 실시간 교통 · 숙소 가격 확인</strong>
                        <p class="text-muted" style="font-size:13px; margin-top:4px;">네이버에서 ${ITINERARY.city}의 실제 가격을 확인해보세요</p>
                        ${isDomesticByLand ? '' : `
                        <div class="flex gap-8" style="margin-top:10px; align-items:center;">
                            <label style="font-size:12px; color:var(--color-gray-500);">항공권 조회 날짜</label>
                            <input type="date" id="tripStartDate" value="${dates.start}" style="font-size:12px; padding:4px 8px;">
                            <span style="font-size:12px; color:var(--color-gray-500);">~</span>
                            <input type="date" id="tripEndDate" value="${dates.end}" style="font-size:12px; padding:4px 8px;">
                        </div>`}
                    </div>
                    <div class="flex gap-8">
                        ${transportButtons}
                        <a href="${naverHotelSearchUrl(ITINERARY.city, ITINERARY.country === '대한민국')}" target="_blank" rel="noopener" class="btn btn-secondary btn-small">🏨 숙소 확인</a>
                    </div>
                </div>
            `;
            if (!isDomesticByLand) {
                const onDateChange = () => {
                    const start = document.getElementById('tripStartDate').value;
                    const end = document.getElementById('tripEndDate').value;
                    if (start && end) { setTripDates(start, end); renderPriceCheckSection(); }
                };
                document.getElementById('tripStartDate').addEventListener('change', onDateChange);
                document.getElementById('tripEndDate').addEventListener('change', onDateChange);
            }
        }

        function renderTransportSection() {
            const data = TRANSPORT_DATA[ITINERARY.city];
            const el = document.getElementById('transportSection');
            if (!data) {
                el.innerHTML = `<div class="card" style="padding:20px 24px;"><p class="text-muted" style="margin:0;">🚗 ${ITINERARY.city}의 상세 교통 정보는 아직 준비 중이에요.</p></div>`;
                return;
            }
            el.innerHTML = `
                <div class="transport-grid">
                    <div class="card transport-card">
                        <h4 class="mb-16">🛫 장거리 교통</h4>
                        ${data.longDistance.map(o => `<div class="transport-option"><span>${o.mode}</span><span class="text-muted">${o.detail}</span></div>`).join('')}
                    </div>
                    <div class="card transport-card">
                        <h4 class="mb-16">🚏 현지 교통</h4>
                        ${data.local.map(o => `<div class="transport-option"><span>${o.mode}</span><span class="text-muted">${o.detail}</span></div>`).join('')}
                        <div class="transport-tip">💡 ${data.tip}</div>
                    </div>
                </div>
            `;
        }

        function generateItineraryFromWishlist() {
            const wishlist = getLS('wishlist', { folders: [{ name: '기본', items: [] }] });
            const items = wishlist.folders.flatMap(f => f.items);
            if (!items.length) { showToast('위시리스트에 담긴 여행지가 없어요. 먼저 담아보세요!', 'error'); return; }

            const slotPattern = [
                { time: '09:00', type: 'activity' },
                { time: '12:00', type: 'meal' },
                { time: '15:00', type: 'activity' },
                { time: '18:30', type: 'meal' },
            ];
            const activitySlotsPerDay = slotPattern.filter(s => s.type === 'activity').length;
            const daysNeeded = Math.ceil(items.length / activitySlotsPerDay);

            let itemIdx = 0;
            const days = [];
            for (let d = 0; d < daysNeeded; d++) {
                const dayItems = [];
                slotPattern.forEach(slot => {
                    if (slot.type === 'meal') {
                        dayItems.push({ time: slot.time, title: '식사 시간', desc: '근처 맛집에서 여유롭게 식사하세요', links: [] });
                    } else if (itemIdx < items.length) {
                        const item = items[itemIdx++];
                        const fullDest = (typeof DESTINATIONS_FULL !== 'undefined' ? DESTINATIONS_FULL : []).find(d => d.id === item.id);
                        const mapQuery = (fullDest && fullDest.baseCity) || item.name;
                        dayItems.push({
                            time: slot.time, title: item.name, desc: `${item.name} 방문 (위시리스트에서 자동 배치)`,
                            links: [{ label: '지도', url: mapSearchUrl(mapQuery, fullDest ? fullDest.country : ITINERARY.country) }],
                        });
                    }
                });
                days.push({ day: d + 1, date: '', items: dayItems });
            }

            const totalPrice = items.reduce((s, i) => s + (i.price || 0), 0);
            const generated = {
                title: '자동 생성 일정', city: ITINERARY.city, country: ITINERARY.country || '대한민국',
                dayCount: daysNeeded, days,
                budgetItems: buildBudgetItems(totalPrice * 10000),
            };
            setLS('generatedItinerary', generated);
            Object.assign(ITINERARY, generated);
            document.getElementById('tripTitle').textContent = generated.title;
            document.getElementById('tripDates').textContent = `총 ${daysNeeded}일 일정 · 2인`;
            renderDayTabs();
            renderSchedule(0);
            renderBudgetAnalysis();
            showToast(`위시리스트 ${items.length}개 장소로 ${daysNeeded}일 일정을 생성했습니다!`, 'success');
        }

        function renderDayTabs() {
            const el = document.getElementById('dayTabs');
            el.innerHTML = ITINERARY.days.map((d, i) =>
                `<button class="day-tab ${i === 0 ? 'active' : ''}" data-day="${i}">DAY ${d.day}</button>`
            ).join('');
            el.querySelectorAll('.day-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    el.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderSchedule(Number(tab.dataset.day));
                });
            });
        }

        function renderSchedule(dayIndex) {
            const day = ITINERARY.days[dayIndex];
            const el = document.getElementById('scheduleContainer');
            el.innerHTML = day.items.map(item => `
                <div class="schedule-item">
                    <div class="schedule-time">${item.time}</div>
                    <div class="schedule-body">
                        <h4>${item.title}</h4>
                        <p>${item.desc}</p>
                        <div class="schedule-links">
                            ${item.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">🔗 ${l.label}</a>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderBudgetAnalysis() {
            const el = document.getElementById('budgetAnalysis');
            const items = ITINERARY.budgetItems;
            const total = items.reduce((s, i) => s + i.amount, 0);
            el.innerHTML = items.map(i => `
                <div class="card budget-item">
                    <div class="amount">${(i.amount/10000).toFixed(0)}만</div>
                    <div class="label">${i.label}</div>
                </div>
            `).join('') + `
                <div class="card budget-item" style="background:var(--color-primary); color:#fff;">
                    <div class="amount" style="color:#fff;">${(total/10000).toFixed(0)}만</div>
                    <div class="label" style="color:rgba(255,255,255,0.8);">총 예상 비용</div>
                </div>
            `;
        }

        function renderReviewSection() {
            const el = document.getElementById('reviewSection');
            const isKorea = ITINERARY.country === '대한민국';
            const reviewUrl = isKorea ? naverReviewSearchUrl(ITINERARY.city + ' 여행') : googleReviewSearchUrl(ITINERARY.city + ' 여행');
            const source = isKorea ? '네이버 카페·블로그에' : '구글에';
            el.innerHTML = `
                <div class="card" style="padding:20px 24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
                    <p class="text-muted" style="margin:0;">${source} 올라온 ${ITINERARY.city} 실제 여행 후기를 확인해보세요.</p>
                    <a href="${reviewUrl}" target="_blank" rel="noopener" class="btn btn-secondary btn-small">🔗 후기 보러가기</a>
                </div>
            `;
        }

        function renderQrTab(type) {
            const el = document.getElementById('qrDisplay');
            let data, label;
            if (type === 'link') { data = window.location.href; label = '이 일정 공유 링크'; }
            if (type === 'wifi') { data = buildWifiQrData('TRAVEL_GUEST', 'travel1234'); label = '숙소 와이파이 (SSID: TRAVEL_GUEST)'; }
            el.innerHTML = `<img src="${buildQrUrl(data)}" alt="QR code" width="180" height="180"><p class="text-muted">${label}</p>`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('tripTitle').textContent = ITINERARY.title;
            document.getElementById('tripDates').textContent = ITINERARY === BUSAN_ITINERARY
                ? '2026.08.14 - 2026.08.17 · 2인'
                : `총 ${ITINERARY.dayCount}일 일정 · 2인`;
            renderWeatherWidget('weatherWidget', ITINERARY.city);
            renderPriceCheckSection();
            renderTransportSection();
            renderLocalTips();
            renderDayTabs();
            renderSchedule(0);
            renderBudgetAnalysis();
            renderReviewSection();

            document.getElementById('copyLinkBtn').addEventListener('click', () => {
                navigator.clipboard.writeText(window.location.href).then(() => showToast('링크가 복사되었습니다', 'success'));
            });

            document.getElementById('shareBtn').addEventListener('click', () => {
                navigator.clipboard.writeText(window.location.href).then(() => showToast('공유 링크가 복사되었습니다', 'success'));
            });

            document.getElementById('autoGenerateBtn').addEventListener('click', generateItineraryFromWishlist);

            document.getElementById('qrShareBtn').addEventListener('click', () => {
                document.getElementById('qrModal').classList.remove('hidden');
                renderQrTab('link');
            });
            document.getElementById('closeQrModalBtn').addEventListener('click', () => document.getElementById('qrModal').classList.add('hidden'));
            document.getElementById('qrModal').addEventListener('click', e => { if (e.target.id === 'qrModal') e.currentTarget.classList.add('hidden'); });
            document.querySelectorAll('.qr-tabs .chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.qr-tabs .chip').forEach(c => c.classList.remove('selected'));
                    chip.classList.add('selected');
                    renderQrTab(chip.dataset.qr);
                });
            });
        });
    </script>
</body>
</html>
