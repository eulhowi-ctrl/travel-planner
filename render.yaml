services:
  - type: web
    name: travel-planner-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
    region: oregon
    plan: free

databases:
  - name: travel_planner_db
    databaseName: travel_planner_db
    user: travel_user
    plan: free
