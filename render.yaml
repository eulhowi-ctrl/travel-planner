services:
  - type: web
    name: travel-planner-api
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: travel_planner_db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
      - key: LOG_LEVEL
        value: INFO
    region: oregon
    plan: standard
    healthCheckPath: /api/v1/health
    scaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70

  - type: web
    name: travel-planner-web
    runtime: static
    staticPublishPath: frontend
    region: oregon
    plan: standard
    routes:
      - path: /
        service: travel-planner-web
      - path: /api
        service: travel-planner-api

databases:
  - name: travel_planner_db
    engine: postgres
    version: 16
    plan: standard
