# Render.com Deployment Configuration
# This file configures automatic deployment on Render.com

services:
  # Backend API Service
    - type: web
        name: travel-planner-api
            runtime: python
                pythonVersion: 3.11
                    buildCommand: |
                          pip install --upgrade pip setuptools wheel
                                pip install -r backend/requirements.txt
                                    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000
                                        envVars:
                                              - key: ENVIRONMENT
                                                      value: production
                                                            - key: DEBUG
                                                                    value: false
                                                                          - key: DATABASE_URL
                                                                                  fromDatabase:
                                                                                            name: travel-planner-db
                                                                                                      property: connectionString
                                                                                                            - key: SECRET_KEY
                                                                                                                    sync: false  # You must set this manually in Render dashboard
                                                                                                                          - key: ALLOWED_ORIGINS
                                                                                                                                  sync: false  # You must set this to your domain
                                                                                                                                        - key: LOG_LEVEL
                                                                                                                                                value: INFO
                                                                                                                                                    region: oregon  # or your preferred region
                                                                                                                                                        plan: standard
                                                                                                                                                            autoDeploy: true  # Auto-deploy on git push
                                                                                                                                                                healthCheckPath: /api/v1/health
                                                                                                                                                                    numInstances: 1
                                                                                                                                                                        maxInstances: 3
                                                                                                                                                                            minInstances: 1
                                                                                                                                                                                scaling:
                                                                                                                                                                                      cpuUtilizationPercent: 70
                                                                                                                                                                                      
                                                                                                                                                                                        # PostgreSQL Database
                                                                                                                                                                                          - type: pserv
                                                                                                                                                                                              name: travel-planner-db
                                                                                                                                                                                                  dbName: travel_planner_db
                                                                                                                                                                                                      user: travel_user
                                                                                                                                                                                                          region: oregon
                                                                                                                                                                                                              plan: standard
                                                                                                                                                                                                                  version: 16
                                                                                                                                                                                                                      backup:
                                                                                                                                                                                                                            enabled: true
                                                                                                                                                                                                                                  schedule: "0 2 * * *"  # Daily at 2 AM UTC
                                                                                                                                                                                                                                      previewPlan:
                                                                                                                                                                                                                                            enabled: true
                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                              # Static Frontend (Optional - if using separate hosting)
                                                                                                                                                                                                                                                - type: static_site
                                                                                                                                                                                                                                                    name: travel-planner-web
                                                                                                                                                                                                                                                        staticPublishPath: ./frontend
                                                                                                                                                                                                                                                            buildCommand: |
                                                                                                                                                                                                                                                                  echo "Frontend ready to deploy"
                                                                                                                                                                                                                                                                      envVars:
                                                                                                                                                                                                                                                                            - key: API_BASE_URL
                                                                                                                                                                                                                                                                                    value: /api/v1
                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                    databases:
                                                                                                                                                                                                                                                                                      - name: travel_planner_db
                                                                                                                                                                                                                                                                                          version: 16
                                                                                                                                                                                                                                                                                              region: oregon
                                                                                                                                                                                                                                                                                                  plan: standard
                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                  routes:
                                                                                                                                                                                                                                                                                                    - path: /
                                                                                                                                                                                                                                                                                                        service: travel-planner-web
                                                                                                                                                                                                                                                                                                          - path: /api
                                                                                                                                                                                                                                                                                                              service: travel-planner-api
                                                                                                                                                                                                                                                                                                                - path: /docs
                                                                                                                                                                                                                                                                                                                    service: travel-planner-api
                                                                                                                                                                                                                                                                                                                      - path: /redoc
                                                                                                                                                                                                                                                                                                                          service: travel-planner-api
                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                          crons:
                                                                                                                                                                                                                                                                                                                            - name: database-backup
                                                                                                                                                                                                                                                                                                                                schedule: "0 2 * * *"  # Daily at 2 AM
                                                                                                                                                                                                                                                                                                                                    command: |
                                                                                                                                                                                                                                                                                                                                          echo "Database backup handled by Render PostgreSQL"
