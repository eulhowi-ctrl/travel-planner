<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 일정 작성 - Travel Planner</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            margin-bottom: 40px;
            border-radius: 12px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .destination-selector {
            margin-bottom: 20px;
        }

        .selected-destinations {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .destination-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .destination-item.selected {
            background: #E3F2FD;
            border-color: #667eea;
        }

        .destination-item-name {
            font-weight: 600;
            color: #333;
        }

        .destination-item-location {
            font-size: 0.85em;
            color: #999;
        }

        .remove-destination {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .remove-destination:hover {
            background: #ee5a52;
        }

        .theme-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .theme-option {
            position: relative;
        }

        .theme-option input[type="radio"] {
            display: none;
        }

        .theme-option label {
            display: block;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            margin-bottom: 0;
        }

        .theme-option input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .theme-option label:hover {
            border-color: #667eea;
        }

        .budget-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-top: 15px;
        }

        .budget-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .budget-info-row:last-child {
            margin-bottom: 0;
            font-weight: 700;
            border-top: 2px solid #ddd;
            padding-top: 10px;
            color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .button-group button {
            flex: 1;
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .step {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .step.active {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #e0e0e0;
            border-radius: 50%;
            font-weight: 700;
            margin-bottom: 10px;
            color: #666;
        }

        .step.active .step-number {
            background: #667eea;
            color: white;
        }

        .step-title {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .steps {
                grid-template-columns: 1fr 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">✈️ Travel Planner</div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="search.html" class="nav-link">Search</a>
                <a href="create-itinerary.html" class="nav-link active">Plan</a>
                <button class="nav-button" id="userMenuBtn">👤 My Account</button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h1>📋 여행 일정 만들기</h1>
        <p>당신의 완벽한 여행을 계획해보세요</p>
    </div>

    <div class="container">
        <!-- Progress Steps -->
        <div class="steps">
            <div class="step active">
                <div class="step-number">1</div>
                <div class="step-title">기본 정보</div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-title">여행지 선택</div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-title">테마 설정</div>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <div class="step-title">완료</div>
            </div>
        </div>

        <!-- Messages -->
        <div class="success-message" id="successMessage">✅ 여행 계획이 생성되었습니다!</div>
        <div class="error-message" id="errorMessage"></div>

        <form id="itineraryForm" onsubmit="handleSubmit(event)">
            <!-- Step 1: Basic Info -->
            <div class="form-section">
                <h2 class="section-title">📝 기본 정보</h2>

                <div class="form-group">
                    <label for="title">여행 계획명 *</label>
                    <input type="text" id="title" name="title" placeholder="예: 2026 여름 가족 여행" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="departureCity">출발 도시 *</label>
                        <input type="text" id="departureCity" name="departure_city" placeholder="서울" required>
                    </div>
                    <div class="form-group">
                        <label for="startDate">출발 날짜 *</label>
                        <input type="date" id="startDate" name="start_date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="endDate">귀국 날짜 *</label>
                    <input type="date" id="endDate" name="end_date" required>
                </div>

                <div class="form-group">
                    <label for="description">설명 (선택사항)</label>
                    <textarea id="description" name="description" placeholder="여행에 대해 설명해주세요..."></textarea>
                </div>

                <div class="form-group">
                    <label for="budgetAllocated">총 예산 (선택사항)</label>
                    <input type="number" id="budgetAllocated" name="budget_allocated" placeholder="예: 5000000">
                </div>
            </div>

            <!-- Step 2: Destinations -->
            <div class="form-section">
                <h2 class="section-title">🌍 여행지 선택</h2>

                <div class="form-group">
                    <label>여행 일정에 포함할 여행지를 선택하세요</label>
                    <div id="destinationList" style="max-height: 400px; overflow-y: auto; border: 2px solid #e0e0e0; border-radius: 8px; padding: 15px;">
                        <div style="text-align: center; color: #999;">로드 중...</div>
                    </div>
                </div>

                <div>
                    <label>선택된 여행지</label>
                    <div id="selectedDestinations" class="selected-destinations"></div>
                </div>
            </div>

            <!-- Step 3: Theme -->
            <div class="form-section">
                <h2 class="section-title">🎯 여행 테마</h2>

                <div class="form-group">
                    <label>당신의 여행 스타일은?</label>
                    <div class="theme-selector">
                        <div class="theme-option">
                            <input type="radio" id="themeCouple" name="travel_theme" value="couple">
                            <label for="themeCouple">👫 커플 여행</label>
                        </div>
                        <div class="theme-option">
                            <input type="radio" id="themeFamily" name="travel_theme" value="family">
                            <label for="themeFamily">👨‍👩‍👧 가족 여행</label>
                        </div>
                        <div class="theme-option">
                            <input type="radio" id="themeSolo" name="travel_theme" value="solo">
                            <label for="themeSolo">🚶 혼자 여행</label>
                        </div>
                        <div class="theme-option">
                            <input type="radio" id="themeFriends" name="travel_theme" value="friends">
                            <label for="themeFriends">👥 친구 여행</label>
                        </div>
                    </div>
                </div>

                <div class="budget-info">
                    <div class="budget-info-row">
                        <span>예상 숙박비:</span>
                        <span id="estimatedAccommodation">-</span>
                    </div>
                    <div class="budget-info-row">
                        <span>예상 식사비:</span>
                        <span id="estimatedFood">-</span>
                    </div>
                    <div class="budget-info-row">
                        <span>예상 활동비:</span>
                        <span id="estimatedActivity">-</span>
                    </div>
                    <div class="budget-info-row">
                        <span>총 예상 비용:</span>
                        <span id="estimatedTotal">-</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="button" class="btn-secondary" onclick="resetForm()">초기화</button>
                <button type="submit" class="btn-primary">
                    <span id="submitText">✨ 일정 생성하기</span>
                    <span id="submitSpinner" class="loading-spinner" style="display: none;"></span>
                </button>
            </div>
        </form>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Travel Planner. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        const API_BASE = "/api/v1";
        let selectedDestinationIds = [];

        document.addEventListener('DOMContentLoaded', async function() {
            // Check authentication
            const token = localStorage.getItem('accessToken');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            // Load destinations
            await loadDestinations();

            // Set minimum date to today
            document.getElementById('startDate').min = new Date().toISOString().split('T')[0];
            document.getElementById('endDate').min = new Date().toISOString().split('T')[0];

            // Listen to date changes
            document.getElementById('startDate').addEventListener('change', updateBudgetEstimate);
            document.getElementById('endDate').addEventListener('change', updateBudgetEstimate);
            document.getElementById('budgetAllocated').addEventListener('change', updateBudgetEstimate);
            document.querySelectorAll('input[name="travel_theme"]').forEach(radio => {
                radio.addEventListener('change', updateBudgetEstimate);
            });
        });

        async function loadDestinations() {
            try {
                const response = await fetch(`${API_BASE}/destinations?skip=0&limit=100`);
                const destinations = await response.json();

                const destList = document.getElementById('destinationList');
                destList.innerHTML = destinations.map(dest => `
                    <div style="padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; hover-bg: #f9f9f9;"
                         onclick="toggleDestination(${dest.id}, '${dest.name}')">
                        <div>
                            <strong>${dest.name}</strong>
                            <div style="font-size: 0.85em; color: #999;">${dest.country}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading destinations:', error);
            }
        }

        function toggleDestination(destId, destName) {
            const idx = selectedDestinationIds.indexOf(destId);
            if (idx > -1) {
                selectedDestinationIds.splice(idx, 1);
            } else {
                selectedDestinationIds.push(destId);
            }
            updateSelectedDestinations();
        }

        function updateSelectedDestinations() {
            const container = document.getElementById('selectedDestinations');
            if (selectedDestinationIds.length === 0) {
                container.innerHTML = '<div style="color: #999;">여행지를 선택해주세요</div>';
                return;
            }

            // Load destinations to get their names
            fetch(`${API_BASE}/destinations?skip=0&limit=100`)
                .then(r => r.json())
                .then(destinations => {
                    const selected = destinations.filter(d => selectedDestinationIds.includes(d.id));
                    container.innerHTML = selected.map(dest => `
                        <div class="destination-item selected">
                            <div class="destination-item-name">${dest.name}</div>
                            <div class="destination-item-location">${dest.country}</div>
                            <button type="button" class="remove-destination" onclick="removeDestination(${dest.id})">
                                ✕ 제거
                            </button>
                        </div>
                    `).join('');
                });
        }

        function removeDestination(destId) {
            selectedDestinationIds = selectedDestinationIds.filter(id => id !== destId);
            updateSelectedDestinations();
        }

        function updateBudgetEstimate() {
            const startDate = new Date(document.getElementById('startDate').value);
            const endDate = new Date(document.getElementById('endDate').value);

            if (!startDate || !endDate || endDate <= startDate) {
                document.getElementById('estimatedTotal').textContent = '-';
                return;
            }

            const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));

            // Default daily budget (from backend)
            const dailyBudgets = {
                'couple': 200000,
                'family': 250000,
                'solo': 150000,
                'friends': 180000
            };

            const selectedTheme = document.querySelector('input[name="travel_theme"]:checked')?.value;
            const dailyBudget = dailyBudgets[selectedTheme] || 200000;

            const accommodation = dailyBudget * 0.4 * days;
            const food = dailyBudget * 0.3 * days;
            const activity = dailyBudget * 0.2 * days;
            const total = dailyBudget * days;

            document.getElementById('estimatedAccommodation').textContent = formatCurrency(accommodation);
            document.getElementById('estimatedFood').textContent = formatCurrency(food);
            document.getElementById('estimatedActivity').textContent = formatCurrency(activity);
            document.getElementById('estimatedTotal').textContent = formatCurrency(total);
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const title = document.getElementById('title').value;
            const departureCity = document.getElementById('departureCity').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const description = document.getElementById('description').value;
            const budgetAllocated = parseFloat(document.getElementById('budgetAllocated').value) || null;
            const travelTheme = document.querySelector('input[name="travel_theme"]:checked')?.value;

            if (!selectedDestinationIds.length) {
                showError('최소 1개 이상의 여행지를 선택해주세요');
                return;
            }

            if (!travelTheme) {
                showError('여행 테마를 선택해주세요');
                return;
            }

            const itineraryData = {
                title,
                departure_city: departureCity,
                start_date: startDate,
                end_date: endDate,
                description: description || undefined,
                budget_allocated: budgetAllocated,
                travel_theme: travelTheme
            };

            try {
                showSubmitLoading(true);

                // Create itinerary
                const response = await fetchAPI(`${API_BASE}/itineraries`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('accessToken')}`
                    },
                    body: JSON.stringify(itineraryData)
                });

                if (!response.ok) throw new Error('Failed to create itinerary');

                const itinerary = await response.json();

                // Generate days
                const daysResponse = await fetchAPI(`${API_BASE}/itineraries/${itinerary.id}/generate-days?${new URLSearchParams({
                    destination_ids: selectedDestinationIds.join(',')
                })}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('accessToken')}`
                    }
                });

                showSuccess('여행 일정이 성공적으로 생성되었습니다!');
                resetForm();

                setTimeout(() => {
                    window.location.href = `budget.html?itineraryId=${itinerary.id}`;
                }, 1500);
            } catch (error) {
                showError('여행 일정 생성 중 오류가 발생했습니다: ' + error.message);
            } finally {
                showSubmitLoading(false);
            }
        }

        function resetForm() {
            document.getElementById('itineraryForm').reset();
            selectedDestinationIds = [];
            updateSelectedDestinations();
            document.getElementById('estimatedTotal').textContent = '-';
        }

        function showSubmitLoading(show) {
            document.getElementById('submitText').style.display = show ? 'none' : 'inline';
            document.getElementById('submitSpinner').style.display = show ? 'inline-block' : 'none';
        }

        function showSuccess(message) {
            const elem = document.getElementById('successMessage');
            elem.textContent = message;
            elem.style.display = 'block';
        }

        function showError(message) {
            const elem = document.getElementById('errorMessage');
            elem.textContent = message;
            elem.style.display = 'block';
            setTimeout(() => elem.style.display = 'none', 5000);
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('ko-KR', {
                style: 'currency',
                currency: 'KRW',
                minimumFractionDigits: 0
            }).format(value);
        }
    </script>
</body>
</html>
