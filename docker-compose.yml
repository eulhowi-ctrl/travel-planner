version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: travel-planner-db
    environment:
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_password_123
      POSTGRES_DB: travel_planner_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_user -d travel_planner_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-planner-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-planner-api
    environment:
      DATABASE_URL: postgresql://travel_user:travel_password_123@postgres:5432/travel_planner_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEBUG: "False"
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/static:/app/static
    networks:
      - travel-planner-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional, for production)
  nginx:
    image: nginx:alpine
    container_name: travel-planner-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx-ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - travel-planner-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  travel-planner-network:
    driver: bridge
