<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>호스트 프로필 - TRAVOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
    .host-hero { display: grid; grid-template-columns: 200px 1fr; gap: 32px; padding: 40px 0; align-items: center; }
    .host-avatar { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, var(--color-primary), var(--color-accent)); display: flex; align-items: center; justify-content: center; font-size: 64px; color: #fff; font-weight: 700; }
    .host-badges { display: flex; gap: 8px; margin: 10px 0 16px; }
    .host-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 24px; }
    .host-stat { padding: 20px; text-align: center; }
    .host-stat .num { font-size: 22px; font-weight: 700; color: var(--color-primary); }
    .host-stat .label { font-size: 12px; color: var(--color-gray-500); margin-top: 4px; }
    .listing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 18px; }
    .listing-card .ph { height: 120px; display:flex; align-items:center; justify-content:center; font-size:40px; background: linear-gradient(135deg, var(--color-accent), var(--color-primary)); }
    .listing-card .body { padding: 14px; }
    @media (max-width: 700px) { .host-hero { grid-template-columns: 1fr; text-align: center; } .host-avatar { margin: 0 auto; } .host-stats { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body data-page="host-profile">
    <div id="header-root"></div>

    <div class="container">
        <div class="host-hero">
            <div class="host-avatar">준</div>
            <div>
                <h1>김준호</h1>
                <div class="host-badges">
                    <span class="badge badge-primary">✔ 인증된 호스트</span>
                    <span class="badge badge-gold">🏆 슈퍼호스트</span>
                </div>
                <p class="text-muted">★ 4.95 · 후기 287개 · 부산 거주</p>
                <p class="text-muted mt-16">부산 토박이 가이드 김준호입니다. 현지인만 아는 숨은 명소와 맛집을 소개해드려요. 2019년부터 활동 중이며, 300건 이상의 여행 일정을 함께 만들었습니다.</p>
            </div>
        </div>

        <div class="host-stats">
            <div class="card host-stat"><div class="num">98%</div><div class="label">응답률</div></div>
            <div class="card host-stat"><div class="num">1시간 이내</div><div class="label">응답 속도</div></div>
            <div class="card host-stat"><div class="num">287</div><div class="label">받은 후기</div></div>
            <div class="card host-stat"><div class="num">6</div><div class="label">운영 중인 장소</div></div>
        </div>

        <section class="section">
            <h2 class="section-title">운영 중인 장소</h2>
            <div class="listing-grid" id="listingGrid"></div>
        </section>
    </div>

    <div id="footer-root"></div>
    <script src="script.js"></script>
    <script>
        const LISTINGS = [
            { name: '해운대 감성 투어', emoji: '🌊', price: 45 },
            { name: '감천문화마을 사진 투어', emoji: '🎨', price: 35 },
            { name: '자갈치 미식 투어', emoji: '🍽️', price: 55 },
            { name: '태종대 & 오륙도 코스', emoji: '⛰️', price: 40 },
            { name: '광안리 야경 크루즈', emoji: '🌉', price: 60 },
            { name: '부산 로컬 카페 투어', emoji: '☕', price: 30 },
        ];

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('listingGrid').innerHTML = LISTINGS.map(l => `
                <div class="card listing-card">
                    <div class="ph">${l.emoji}</div>
                    <div class="body">
                        <strong>${l.name}</strong>
                        <div class="text-primary mt-16" style="font-weight:700;">${l.price}만원~</div>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
