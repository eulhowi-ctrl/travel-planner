<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갤러리 - TRAVOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
    .viewer-wrap { padding: 32px 0; }
    .viewer-main {
        position: relative; height: 480px; border-radius: var(--radius-lg); overflow: hidden;
        background: var(--color-dark); display: flex; align-items: center; justify-content: center;
        cursor: grab; touch-action: none;
    }
    .viewer-main img { transition: transform 0.1s ease-out; user-select: none; pointer-events: none; }
    .viewer-controls {
        position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 8px; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: var(--radius-pill);
    }
    .viewer-controls button { color: #fff; font-size: 16px; padding: 4px 10px; }
    .viewer-controls button:hover { background: rgba(255,255,255,0.15); border-radius: var(--radius-pill); }
    .zoom-level { color: #fff; font-size: 13px; align-self: center; min-width: 44px; text-align: center; }
    .fullscreen-btn { position: absolute; top: 16px; right: 16px; color: #fff; font-size: 20px; background: rgba(0,0,0,0.4); padding: 8px 10px; border-radius: 8px; }

    .thumb-strip { display: flex; gap: 10px; overflow-x: auto; padding: 16px 0; }
    .thumb-strip img { width: 88px; height: 64px; object-fit: cover; border-radius: 8px; opacity: 0.6; flex-shrink: 0; cursor: pointer; border: 2px solid transparent; }
    .thumb-strip img.active { opacity: 1; border-color: var(--color-primary); }

    .user-photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .user-photo-grid .photo-card { border-radius: var(--radius-md); overflow: hidden; position: relative; height: 160px; }
    .user-photo-grid .photo-card .ph { height:100%; display:flex; align-items:center; justify-content:center; font-size:40px; background: linear-gradient(135deg, var(--color-accent), var(--color-primary)); }
    .photo-card .photo-author { position: absolute; bottom: 8px; left: 8px; color: #fff; font-size: 12px; background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: var(--radius-pill); }
</style>
</head>
<body data-page="gallery">
    <div id="header-root"></div>

    <div class="container viewer-wrap">
        <h1 class="mb-16">부산 갤러리</h1>
        <div class="viewer-main" id="viewerMain">
            <img id="viewerImg" src="" alt="destination photo" style="font-size:200px;">
            <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>
            <div class="viewer-controls">
                <button id="zoomOutBtn">−</button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button id="zoomInBtn">+</button>
                <button id="resetZoomBtn">⟲</button>
            </div>
        </div>
        <div class="thumb-strip" id="thumbStrip"></div>

        <section class="section">
            <h2 class="section-title">여행자들이 남긴 사진</h2>
            <div class="user-photo-grid" id="userPhotoGrid"></div>
        </section>
    </div>

    <div id="footer-root"></div>
    <script src="script.js"></script>
    <script>
        const PHOTOS = ['🌊','🌉','🏖️','🌅','🏙️','⛺'];
        const USER_PHOTOS = [
            { emoji: '📸', author: '김민지' }, { emoji: '🌇', author: '이준호' },
            { emoji: '🍜', author: '박수아' }, { emoji: '🏞️', author: '최영훈' },
            { emoji: '🎆', author: '정하늘' }, { emoji: '🚶', author: '오세진' },
        ];

        let currentIndex = 0;
        let zoom = 100;
        const MIN_ZOOM = 100, MAX_ZOOM = 300, ZOOM_STEP = 25;
        let panX = 0, panY = 0;

        function renderMainImage() {
            const img = document.getElementById('viewerImg');
            img.replaceWith(Object.assign(document.createElement('div'), {
                id: 'viewerImg',
                style: `font-size:200px; transform: scale(${zoom/100}) translate(${panX}px, ${panY}px);`,
                textContent: PHOTOS[currentIndex],
            }));
            document.getElementById('zoomLevel').textContent = zoom + '%';
        }

        function renderThumbs() {
            const el = document.getElementById('thumbStrip');
            el.innerHTML = PHOTOS.map((p, i) => `<div class="${i === currentIndex ? 'active' : ''}" data-idx="${i}" style="width:88px;height:64px;border-radius:8px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;background:${i===currentIndex?'var(--color-primary)':'var(--color-gray-100)'};border:2px solid ${i===currentIndex?'var(--color-primary)':'transparent'};">${p}</div>`).join('');
            el.querySelectorAll('[data-idx]').forEach(t => t.addEventListener('click', () => { currentIndex = Number(t.dataset.idx); zoom = 100; panX = 0; panY = 0; renderMainImage(); renderThumbs(); }));
        }

        function renderUserPhotos() {
            document.getElementById('userPhotoGrid').innerHTML = USER_PHOTOS.map(p => `
                <div class="card photo-card">
                    <div class="ph">${p.emoji}</div>
                    <span class="photo-author">${p.author}</span>
                </div>
            `).join('');
        }

        function setZoom(newZoom) {
            zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
            if (zoom === MIN_ZOOM) { panX = 0; panY = 0; }
            renderMainImage();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderMainImage();
            renderThumbs();
            renderUserPhotos();

            document.getElementById('zoomInBtn').addEventListener('click', () => setZoom(zoom + ZOOM_STEP));
            document.getElementById('zoomOutBtn').addEventListener('click', () => setZoom(zoom - ZOOM_STEP));
            document.getElementById('resetZoomBtn').addEventListener('click', () => setZoom(100));

            document.getElementById('fullscreenBtn').addEventListener('click', () => {
                const el = document.getElementById('viewerMain');
                if (!document.fullscreenElement) el.requestFullscreen?.();
                else document.exitFullscreen?.();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % PHOTOS.length; zoom = 100; panX=0; panY=0; renderMainImage(); renderThumbs(); }
                if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + PHOTOS.length) % PHOTOS.length; zoom = 100; panX=0; panY=0; renderMainImage(); renderThumbs(); }
                if (e.key === '+' || e.key === '=') setZoom(zoom + ZOOM_STEP);
                if (e.key === '-') setZoom(zoom - ZOOM_STEP);
            });

            // Touch pinch-to-zoom
            const viewer = document.getElementById('viewerMain');
            let lastDist = null;
            viewer.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.hypot(dx, dy);
                    if (lastDist !== null) {
                        const delta = (dist - lastDist) * 0.5;
                        setZoom(zoom + delta);
                    }
                    lastDist = dist;
                }
            }, { passive: false });
            viewer.addEventListener('touchend', () => { lastDist = null; });

            // Mouse wheel zoom
            viewer.addEventListener('wheel', (e) => {
                e.preventDefault();
                setZoom(zoom + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
            }, { passive: false });
        });
    </script>
</body>
</html>
